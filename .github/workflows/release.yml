name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.4.2"
        required: true
        type: string
      title:
        description: "Release title, e.g. v1.4.2 — Bridge Client Robustness Fixes"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish ${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate inputs
        run: |
          if ! printf '%s' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag must look like v1.2.3" >&2
            exit 1
          fi
          if [ ! -f ".github/release-notes/${TAG}.md" ]; then
            echo "missing release notes file .github/release-notes/${TAG}.md" >&2
            exit 1
          fi
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          if [ "v${PACKAGE_VERSION}" != "${TAG}" ]; then
            echo "package.json version v${PACKAGE_VERSION} does not match tag ${TAG}" >&2
            exit 1
          fi
        env:
          TAG: ${{ inputs.tag }}
      - name: Create annotated tag
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag ${TAG} already exists; leaving it unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TITLE}"
          git push origin "refs/tags/${TAG}"
        env:
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
      - name: Publish GitHub release
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; leaving it unchanged"
            exit 0
          fi
          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes-file ".github/release-notes/${TAG}.md" \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
