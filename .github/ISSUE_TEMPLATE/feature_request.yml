name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently difficult or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Permissions and security impact
      description: Note any new Chrome permissions, native-host access, browser data, or CDP capabilities.
    validations:
      required: true
