name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities or include browser data, tokens, cookies, or credentials. Use the private process in SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS, Linux, or Windows version
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: Node.js, Chrome, and OpenCode versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification output
      description: Sanitized output from relevant checks. Remove paths and browser data.
